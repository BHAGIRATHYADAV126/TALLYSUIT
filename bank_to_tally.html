<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank → Tally XML Converter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1f2e;--ink-soft:#4a5168;--ink-faint:#8b93a8;--paper:#f7f6f2;--white:#fff;--accent:#1a6b3c;--accent-lt:#e6f4ec;--border:#dddbd4;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 60px}
header{width:100%;max-width:660px;margin-bottom:24px;border-bottom:2px solid var(--ink);padding-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end}
header h1{font-size:22px;font-weight:600;letter-spacing:-.5px}
header .ey{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.logout{font-size:12px;color:var(--ink-soft);text-decoration:none;font-family:var(--mono);padding:5px 10px;border:1px solid var(--border);border-radius:4px}
.logout:hover{color:var(--ink);border-color:var(--ink)}
.card{width:100%;max-width:660px;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:20px 24px;margin-bottom:12px}
.ct{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.fr.s{grid-template-columns:1fr}
.fi label{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:4px}
.fi input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--paper);outline:none}
.fi input:focus{border-color:var(--accent);background:var(--white)}
.dz{border:2px dashed var(--border);border-radius:6px;padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.dz:hover,.dz.drag-over{border-color:var(--accent);background:var(--accent-lt)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz.hf{border-style:solid;border-color:var(--accent);background:var(--accent-lt)}
.dz.hf .dl{color:var(--accent)}
.di{font-size:24px;margin-bottom:6px}
.dl{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:2px}
.ds{font-size:12px;color:var(--ink-faint);font-family:var(--mono)}
.conn-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.btn-sm{padding:7px 14px;background:var(--ink);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-sm:hover{background:var(--accent)}
#tallyStatus{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
.bc{width:100%;max-width:660px;padding:13px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;border:none;border-radius:6px;cursor:pointer;margin-bottom:10px;transition:background .15s}
.bc:disabled{opacity:.45;cursor:not-allowed}
.bc.dark{background:var(--ink)}.bc.dark:hover:not(:disabled){background:#2a2f3e}
.bc.green{background:var(--accent)}.bc.green:hover:not(:disabled){background:#155e33}
.log{width:100%;max-width:660px;display:none}
.log.v{display:block}
.la{background:var(--ink);color:#a8f0c0;font-family:var(--mono);font-size:12px;border-radius:6px;padding:14px 16px;line-height:1.7;min-height:48px;white-space:pre-wrap;word-break:break-all}
.le{color:#ff9f7a}.lo{color:#a8f0c0}.li{color:#7ac4e8}
.dl-btn{display:none;width:100%;max-width:660px;padding:12px;background:var(--accent);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;border:none;border-radius:6px;cursor:pointer;margin-top:6px;text-align:center;text-decoration:none}
.dl-btn.v{display:block}.dl-btn:hover{background:#155e33}
@keyframes sp{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:7px}
footer{margin-top:28px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);text-align:center}
</style>
</head>
<body>

<header>
  <div>
    <div class="ey">Tally Suite</div>
    <h1>Bank Statement → Tally XML</h1>
  </div>
  <a href="/auth/logout" class="logout">Logout</a>
</header>

<div class="card">
  <div class="ct">Ledger & Company</div>
  <div class="fr">
    <div class="fi"><label>Bank Ledger</label><input type="text" id="bankLedger" value="HDFC BANK."></div>
    <div class="fi"><label>Suspense Ledger</label><input type="text" id="otherLedger" value="SUSPENSES"></div>
  </div>
  <div class="fr s">
    <div class="fi"><label>Company Name (exact as in Tally)</label><input type="text" id="company" value="Muskan Jewellers"></div>
  </div>
</div>

<div class="card">
  <div class="ct">Tally Prime Connection</div>
  <div class="fr s">
    <div class="fi"><label>Tally Prime URL</label><input type="text" id="tallyUrl" value="http://localhost:9900"></div>
  </div>
  <div class="conn-row">
    <button class="btn-sm" onclick="testConn()">⚡ Test Connection</button>
    <span id="tallyStatus">Not tested</span>
  </div>
</div>

<div class="card">
  <div class="ct">Bank Statement File</div>
  <div class="dz" id="dz">
    <input type="file" id="fi" accept=".xlsx,.xls">
    <div class="di">📂</div>
    <div class="dl" id="dl">Click to select or drag & drop</div>
    <div class="ds" id="ds">Accepts .xlsx / .xls bank statement</div>
  </div>
</div>

<button class="bc dark" id="convertBtn" disabled onclick="doConvert()">Convert to Tally XML</button>
<button class="bc green" id="sendBtn" disabled onclick="doSend()">⚡ Convert & Send to Tally Prime</button>

<div class="log" id="logBox"><div class="la" id="la"></div></div>
<a class="dl-btn" id="dlBtn">⬇ Download tally_import.xml</a>

<footer>Conversion runs on server — your source code is fully protected</footer>

<script>
var selectedFile = null;

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, cls) {
  var box = document.getElementById('logBox');
  var la  = document.getElementById('la');
  box.classList.add('v');
  var s = document.createElement('span');
  s.className = cls || 'li';
  s.textContent = msg + '\n';
  la.appendChild(s);
  la.scrollTop = la.scrollHeight;
}
function clearLog() {
  document.getElementById('la').innerHTML = '';
  document.getElementById('dlBtn').className = 'dl-btn';
}

// ── File handling ─────────────────────────────────────────────────────────────
document.getElementById('fi').addEventListener('change', function(e) {
  handleFile(e.target.files[0]);
});
var dz = document.getElementById('dz');
dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
dz.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('drag-over');
  if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
function handleFile(f) {
  if(!f) return;
  if(!/\.(xlsx|xls)$/i.test(f.name)){ alert('Please select .xlsx or .xls file'); return; }
  selectedFile = f;
  dz.classList.add('hf');
  document.getElementById('dl').textContent = f.name;
  document.getElementById('ds').textContent = (f.size/1024).toFixed(1) + ' KB';
  document.getElementById('convertBtn').disabled = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── Build FormData ────────────────────────────────────────────────────────────
function buildForm() {
  var fd = new FormData();
  fd.append('file',         selectedFile);
  fd.append('bank_ledger',  document.getElementById('bankLedger').value.trim()  || 'BANK LEDGER');
  fd.append('other_ledger', document.getElementById('otherLedger').value.trim() || 'SUSPENSES');
  fd.append('company',      document.getElementById('company').value.trim()     || 'My Company');
  return fd;
}

// ── Convert only ─────────────────────────────────────────────────────────────
async function doConvert() {
  if(!selectedFile) return;
  clearLog();
  var btn = document.getElementById('convertBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Converting…';
  log('🔄 Sending file to server…', 'li');

  try {
    var res = await fetch('/api/convert', {
      method: 'POST',
      body:   buildForm(),
    });

    if(res.status === 401) {
      log('❌ Session expired. Redirecting to login…', 'le');
      setTimeout(function(){ window.location.href = '/login'; }, 1500);
      return;
    }
    if(!res.ok) {
      var err = await res.json();
      log('❌ ' + (err.detail || 'Conversion failed.'), 'le');
      return;
    }

    var vouchers = res.headers.get('X-Vouchers') || '?';
    var skipped  = res.headers.get('X-Skipped')  || '0';
    var engine   = res.headers.get('X-Engine')   || '';

    var blob = await res.blob();
    var url  = URL.createObjectURL(blob);
    var db   = document.getElementById('dlBtn');
    db.href     = url;
    db.download = 'tally_import.xml';
    db.className = 'dl-btn v';

    log('✅ Done! ' + vouchers + ' vouchers converted (' + engine + ')', 'lo');
    if(parseInt(skipped) > 0) log('⚠  ' + skipped + ' rows skipped.', 'li');
    log('   Company: ' + document.getElementById('company').value, 'li');

  } catch(e) {
    log('❌ ' + e.message, 'le');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Convert to Tally XML';
  }
}

// ── Convert + Push ────────────────────────────────────────────────────────────
async function doSend() {
  if(!selectedFile) return;
  clearLog();
  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Converting & Sending…';
  log('🔄 Sending file to server for conversion…', 'li');

  try {
    var fd = buildForm();
    fd.append('tally_url', document.getElementById('tallyUrl').value.trim() || 'http://localhost:9900');

    var res = await fetch('/api/convert/push', {
      method: 'POST',
      body:   fd,
    });

    if(res.status === 401) {
      log('❌ Session expired. Redirecting to login…', 'le');
      setTimeout(function(){ window.location.href = '/login'; }, 1500);
      return;
    }

    var data = await res.json();

    if(res.status === 503) {
      log('❌ ' + data.detail, 'le');
      return;
    }

    if(data.success) {
      log('✅ Tally import successful!', 'lo');
      log('   Vouchers created : ' + data.created, 'lo');
      log('   Total converted  : ' + data.vouchers, 'li');
      if(data.skipped > 0) log('   Skipped          : ' + data.skipped, 'li');
    } else {
      log('❌ Tally rejected the import:', 'le');
      if(data.errors && data.errors.length)
        data.errors.forEach(function(e){ log('   ' + e, 'le'); });
      else
        log('   ' + JSON.stringify(data), 'le');
    }
  } catch(e) {
    log('❌ ' + e.message, 'le');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⚡ Convert & Send to Tally Prime';
  }
}

// ── Test Tally connection ─────────────────────────────────────────────────────
async function testConn() {
  var st  = document.getElementById('tallyStatus');
  var tal = document.getElementById('tallyUrl').value.trim() || 'http://localhost:9900';
  st.style.color = 'var(--ink-faint)'; st.textContent = 'Testing…';
  try {
    var res  = await fetch('/api/tally/status?tally_url=' + encodeURIComponent(tal));
    var data = await res.json();
    if(data.connected) {
      st.style.color = 'var(--accent)';
      st.textContent = '✓ Connected' + (data.companies && data.companies.length ? ' — ' + data.companies[0] : '');
    } else {
      st.style.color = '#b84c00';
      st.textContent = '✗ ' + (data.error || 'Not reachable');
    }
  } catch(e) {
    st.style.color = '#b84c00';
    st.textContent = '✗ ' + e.message;
  }
}
</script>
</body>
</html>
