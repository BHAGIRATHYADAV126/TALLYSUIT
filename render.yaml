# Render deployment config
# Place this in your project root

services:
  - type: web
    name: tally-suite
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn licence_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: ADMIN_TOKEN
        sync: false
      - key: TRIAL_DAYS
        value: "30"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: PLAN_STARTER_MONTHLY
        sync: false
      - key: PLAN_PRO_MONTHLY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
